<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>180db Downloads</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #2a2a2a;
      --text: #fafafa;
      --text-muted: #888;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --beta: #f97316;
      --stable: #22c55e;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem;
    }
    
    .container {
      max-width: 640px;
      width: 100%;
    }
    
    header {
      text-align: center;
      margin-bottom: 3rem;
    }
    
    .logo {
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: -0.05em;
      margin-bottom: 0.5rem;
    }
    
    .tagline {
      color: var(--text-muted);
      font-size: 1.1rem;
    }
    
    .channels {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .channel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.2s;
    }
    
    .channel:hover {
      border-color: #444;
    }
    
    .channel-info {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    
    .channel-name {
      font-size: 1.25rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .badge-beta {
      background: rgba(249, 115, 22, 0.15);
      color: var(--beta);
    }
    
    .badge-stable {
      background: rgba(34, 197, 94, 0.15);
      color: var(--stable);
    }
    
    .channel-desc {
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    
    .channel-version {
      color: var(--text-muted);
      font-size: 0.8rem;
      font-family: ui-monospace, monospace;
    }
    
    .download-btn {
      background: var(--accent);
      color: white;
      text-decoration: none;
      padding: 0.6rem 1.25rem;
      border-radius: 8px;
      font-weight: 500;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    
    .download-btn:hover {
      background: var(--accent-hover);
    }
    
    .download-btn.disabled {
      background: var(--border);
      color: var(--text-muted);
      pointer-events: none;
    }
    
    .requirements {
      margin-top: 3rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    
    .requirements a {
      color: var(--accent);
      text-decoration: none;
    }
    
    .requirements a:hover {
      text-decoration: underline;
    }
    
    footer {
      margin-top: auto;
      padding-top: 4rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    
    footer a {
      color: var(--text-muted);
      text-decoration: none;
    }
    
    footer a:hover {
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">180db</div>
      <p class="tagline">High-fidelity audio player for macOS</p>
    </header>
    
    <div class="channels">
      <div class="channel">
        <div class="channel-info">
          <div class="channel-name">
            180db
            <span class="badge badge-stable">Stable</span>
          </div>
          <div class="channel-desc">Production release for everyday use</div>
          <div class="channel-version">v0.1.0</div>
        </div>
        <a href="https://github.com/Advanced-Research-GmbH/180db-releases/releases/download/v0.1.0%2B260302.1602/180db-0.1.0.dmg" class="download-btn">Download</a>
      </div>
      
      <div class="channel">
        <div class="channel-info">
          <div class="channel-name">
            180db Beta
            <span class="badge badge-beta">Beta</span>
          </div>
          <div class="channel-desc">Early access to new features</div>
          <div class="channel-version">v0.1.0</div>
        </div>
        <a href="https://github.com/Advanced-Research-GmbH/180db-releases/releases/download/v0.1.0-beta%2B260302.1641/180db-Beta-0.1.0.dmg" class="download-btn">Download</a>
      </div>
    </div>
    
    <div class="requirements">
      <p>Requires macOS 15.6 (Sequoia) or later</p>
      <p style="margin-top: 0.5rem;">
        <a href="https://github.com/advancedresearch/180db-releases/releases">View all releases</a>
      </p>
    </div>
  </div>
  
  <footer>
    <p>&copy; 2026 <a href="https://advanced-research.net">Advanced Research</a></p>
  </footer>
</body>
</html>
